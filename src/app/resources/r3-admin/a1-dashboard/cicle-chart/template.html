<div #chartContainer2 class="h-[220px] overflow-auto pr-1">
    <div *ngIf="topMenus?.length; else noTopMenuTemplate" class="space-y-2">
        <div *ngFor="let item of topMenus; let i = index"
            class="flex items-center justify-between rounded-lg border border-slate-200 bg-white px-3 py-2 dark:border-slate-700 dark:bg-slate-800">
            <div class="min-w-0 flex-1">
                <p class="truncate text-sm font-semibold text-slate-700 dark:text-slate-200">
                    {{ i + 1 }}. {{ item.name }}
                </p>
                <p class="text-xs text-slate-500">{{ item.code }}</p>
            </div>
            <div class="text-right pl-3">
                <p class="text-sm font-semibold text-emerald-600 dark:text-emerald-400">{{ item.soldQty | number }} sold</p>
                <p class="text-xs text-slate-500">${{ item.revenue | usdFromKhr:usdRate | number:'1.2-2' }}</p>
            </div>
        </div>
    </div>

    <ng-template #noTopMenuTemplate>
        <div class="flex h-full min-h-[160px] flex-col items-center justify-center text-slate-500">
            <mat-icon svgIcon="toc"></mat-icon>
            <span class="mt-2 text-base">No top sale menu data</span>
        </div>
    </ng-template>
</div>
