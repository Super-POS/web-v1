<div class="out-create-section md-form-field-appearance-outline">
    <div mat-dialog-title class="min-h-14 max-h-14 flex gap-2 justify-between items-center py-2 pr-2.5">
        <div class="flex flex-1 items-center text-slate-500">
            <h1 class="text-3xl">Create</h1>
        </div>
        <div class="flex items-center cursor-pointer">
            <mat-icon class="-mb-0.5" [svgIcon]="'heroicons_outline:x-mark'" (click)="closeDialog()"></mat-icon>
        </div>
    </div>

    <div class="out-create-body px-4 pb-2">
        <form [formGroup]="form" class="out-create-content border-t pt-4">
            <mat-checkbox formControlName="generate_code" color="primary" class="mb-3 block">
                Generate random code
            </mat-checkbox>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Coupon code</mat-label>
                <input
                    matInput
                    formControlName="code"
                    placeholder="{{ form.get('generate_code')?.value ? 'Assigned when you create' : 'e.g. SUMMER10' }}"
                    maxlength="64"
                    class="uppercase" />
                <mat-hint *ngIf="form.get('generate_code')?.value">A unique code is created on the server when you save.</mat-hint>
                <mat-error>Code must be at least 2 characters</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Discount (%)</mat-label>
                <input matInput type="number" formControlName="discount_percent" min="0.01" max="100" step="0.01" placeholder="10" />
                <mat-error>Enter a percent between 0.01 and 100</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Coupon note (optional)</mat-label>
                <input matInput formControlName="note" maxlength="500" placeholder="Internal note" />
            </mat-form-field>
        </form>
    </div>

    <mat-dialog-actions>
        <div class="w-full flex justify-end px-1">
            <button
                class="helpers-mat-button-md text-white bg-[#102d71]"
                mat-flat-button
                type="button"
                (click)="submit()"
                [disabled]="isSaving || !form.valid">
                <span *ngIf="!isSaving">Create</span>
                <mat-progress-spinner *ngIf="isSaving" [diameter]="24" [mode]="'indeterminate'"></mat-progress-spinner>
            </button>
        </div>
    </mat-dialog-actions>
</div>
