<div class="p-4 md:p-6 max-w-5xl mx-auto">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
        <h1 class="text-xl font-semibold text-slate-800 dark:text-slate-100">Modifiers</h1>
        <div class="flex flex-wrap gap-2">
            <button mat-flat-button color="primary" type="button" (click)="openGroupDialog()">
                <mat-icon class="!w-5 !h-5 mr-1" [svgIcon]="'mdi:plus'"></mat-icon>
                New group
            </button>
        </div>
    </div>

    <div *ngIf="isLoading" class="text-slate-500">Loading…</div>

    <mat-accordion *ngIf="!isLoading" multi>
        <mat-expansion-panel *ngFor="let g of filteredGroups()" class="!mb-2">
            <mat-expansion-panel-header>
                <mat-panel-title>
                    <span class="font-medium">{{ g.name }}</span>
                </mat-panel-title>
                <mat-panel-description class="!justify-end gap-1 flex-wrap">
                    <span *ngIf="!g.is_active" class="text-amber-600 text-sm">Inactive</span>
                </mat-panel-description>
            </mat-expansion-panel-header>

            <div class="flex flex-wrap gap-2 mb-3">
                <button
                    mat-button
                    type="button"
                    class="!bg-blue-50 !text-blue-700 hover:!bg-blue-100 dark:!bg-blue-900/40 dark:!text-blue-200"
                    (click)="openGroupDialog(g)">
                    Edit group
                </button>
                <button
                    mat-button
                    type="button"
                    color="warn"
                    class="!bg-red-50 hover:!bg-red-100 dark:!bg-red-900/40"
                    (click)="deleteGroup(g)">
                    Delete group
                </button>
                <button mat-stroked-button type="button" (click)="openOptionDialog(g.id)">Add option</button>
            </div>

            <div class="text-xs text-slate-500 mb-2">
                {{ g.options?.length || 0 }} options · {{ optionsWithRecipe(g) }} with ingredient recipe
            </div>

            <div class="overflow-x-auto">
                <table mat-table [dataSource]="g.options || []" class="w-full min-w-[480px]">
                    <ng-container matColumnDef="label">
                        <th mat-header-cell *matHeaderCellDef>Label</th>
                        <td mat-cell *matCellDef="let o">{{ o.label }}</td>
                    </ng-container>
                    <ng-container matColumnDef="price_delta">
                        <th mat-header-cell *matHeaderCellDef>+ KHR</th>
                        <td mat-cell *matCellDef="let o">{{ o.price_delta | number }}</td>
                    </ng-container>
                    <ng-container matColumnDef="amount">
                        <th mat-header-cell *matHeaderCellDef>Amount</th>
                        <td mat-cell *matCellDef="let o" class="text-xs">{{ optionAmount(o) }}</td>
                    </ng-container>
                    <ng-container matColumnDef="flags">
                        <th mat-header-cell *matHeaderCellDef>Flags</th>
                        <td mat-cell *matCellDef="let o">
                            <span *ngIf="o.is_default" class="text-xs bg-slate-200 dark:bg-slate-700 rounded px-1">default</span>
                            <span *ngIf="!o.is_active" class="text-xs text-amber-700 ml-1">off</span>
                        </td>
                    </ng-container>
                    <ng-container matColumnDef="action">
                        <th mat-header-cell *matHeaderCellDef></th>
                        <td mat-cell *matCellDef="let o">
                            <button mat-icon-button type="button" (click)="openOptionDialog(g.id, o)" aria-label="Edit">
                                <mat-icon
                                    class="!bg-blue-50 !text-blue-700 rounded-md p-1 dark:!bg-blue-900/40 dark:!text-blue-200"
                                    [svgIcon]="'mdi:pencil'"></mat-icon>
                            </button>
                            <button mat-icon-button type="button" color="warn" (click)="deleteOption(g, o)" aria-label="Delete">
                                <mat-icon
                                    class="!bg-red-50 rounded-md p-1 dark:!bg-red-900/40"
                                    [svgIcon]="'mdi:trash-can-outline'"></mat-icon>
                            </button>
                        </td>
                    </ng-container>
                    <tr mat-header-row *matHeaderRowDef="optionColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: optionColumns"></tr>
                </table>
            </div>
        </mat-expansion-panel>
    </mat-accordion>

    <div *ngIf="!isLoading && groups.length === 0" class="text-slate-500 py-8 text-center border border-dashed rounded-lg">
        No modifier groups yet. Create one to get started.
    </div>
</div>
