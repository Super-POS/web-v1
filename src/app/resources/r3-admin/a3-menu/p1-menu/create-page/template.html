<div class="list-sale-section bg-white dark:bg-gray-800 mt-4 mx-4 rounded-tl-lg rounded-tr-lg">
    <div class="bg-white min-h-14 max-h-14 flex gap-2 justify-between items-center py-2 pl-5 pr-2.5 dark:bg-gray-800 border-b">
        <div class="flex flex-1 items-center font-medium">
            <mat-icon class="text-gray-600 dark:text-white icon-size-5" [svgIcon]="'heroicons_outline:home'"></mat-icon>
            <span class="text-lg text-gray-600 dark:text-white ml-1.5">ម៉ឺនុយ</span>
            <mat-icon class="-mb-0.5" [svgIcon]="'mat_solid:chevron_right'"></mat-icon>
            <span class="text-lg text-gray-600 dark:text-white">បង្កើតថ្មី</span>
        </div>
        <button mat-icon-button (click)="goBack()">
            <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
        </button>
    </div>

    <div class="p-4 md-form-field-appearance-outline w-full">
        <form [formGroup]="productForm" class="pt-4 w-full">
            <div class="rounded-none h-fit lg:h-auto">
                <div class="p-2">
                    <div class="w-full md:min-w-64 flex justify-center">
                        <div class="pr-0 md:pr-5 w-full max-w-50 min-h-50 overflow-hidden relative">
                            <img [src]="src" (click)="fileInput.click()"
                                class="cursor-pointer rounded-full w-40 h-40 border-2 border-blue-200 object-cover"
                                alt="Menu Picture" />
                            <input type="file" #fileInput style="display: none;" (change)="onFileChange($event)"
                                accept="image/*" />
                        </div>
                    </div>
                </div>
            </div>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>លេខកូដ</mat-label>
                <input matInput formControlName="code" placeholder="បញ្ចូលលេខកូដ">
                <mat-error>សូមបញ្ចូលលេខកូដម៉ឺនុយ</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>ឈ្មោះ</mat-label>
                <input matInput formControlName="name" placeholder="បញ្ចូលឈ្មោះ">
                <mat-error>សូមបញ្ចូលឈ្មោះម៉ឺនុយ</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>ប្រភេទម៉ឺនុយ</mat-label>
                <mat-select formControlName="type_id">
                    @for (item of setup; track item.id) {
                    <mat-option [value]="item.id">
                        <span>{{ item.name }}</span>
                    </mat-option>
                    }
                </mat-select>
                <mat-error>សូមជ្រើសរើសប្រភេទម៉ឺនុយ</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>តម្លៃ(៛)</mat-label>
                <input matInput type="number" formControlName="unit_price" placeholder="បញ្ចូលតម្លៃ(៛)">
                <mat-error>សូមបញ្ចូលតម្លៃជាលុយខ្មែរ</mat-error>
            </mat-form-field>

            <div class="w-full flex justify-end gap-2 pt-2">
                <button class="helpers-mat-button-md" mat-stroked-button type="button" (click)="goBack()">បោះបង់</button>
                <button class="helpers-mat-button-md bg-[#264497] text-white" mat-flat-button type="button" (click)="submit()"
                    [disabled]="productForm.invalid || saving">
                    <span *ngIf="!saving">រួចរាល់</span>
                    <mat-progress-spinner *ngIf="saving" [diameter]="24" [mode]="'indeterminate'"></mat-progress-spinner>
                </button>
            </div>
        </form>
    </div>
</div>
