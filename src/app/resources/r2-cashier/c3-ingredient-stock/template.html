<div class="list-sale-section w-full bg-white dark:bg-gray-800 mt-4 mx-4 rounded-tl-lg rounded-tr-lg">
    <div class="bg-white min-h-14 max-h-14 flex gap-2 justify-between items-center py-2 pl-5 pr-2.5 dark:bg-gray-800">
        <div class="flex flex-1 items-center font-medium">
            <mat-icon class="text-gray-600 dark:text-white icon-size-5" [svgIcon]="'heroicons_outline:home'"></mat-icon>
            <span class="text-lg text-gray-600 dark:text-white ml-1.5">Ingredients</span>
        </div>
    </div>

    <div class="list-sale-body w-full p-4">
        <div *ngIf="isLoading">Getting data from API...</div>

        <div *ngIf="!isLoading && dataSource.data.length === 0" class="text-center py-8 text-gray-500">
            No data
        </div>

        <div *ngIf="!isLoading && dataSource.data.length > 0" class="w-full overflow-x-auto">
            <table mat-table [dataSource]="dataSource" class="w-full min-w-full">
                <ng-container matColumnDef="no">
                    <th mat-header-cell *matHeaderCellDef>No.</th>
                    <td mat-cell *matCellDef="let item; let i = index">{{ i + 1 }}</td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef>Ingredients</th>
                    <td mat-cell *matCellDef="let item">{{ item.name }}</td>
                </ng-container>

                <ng-container matColumnDef="unit">
                    <th mat-header-cell *matHeaderCellDef>Unit</th>
                    <td mat-cell *matCellDef="let item">{{ item.unit || '-' }}</td>
                </ng-container>

                <ng-container matColumnDef="quantity">
                    <th mat-header-cell *matHeaderCellDef>Stock quantity</th>
                    <td mat-cell *matCellDef="let item">{{ item.quantity | number:'1.0-3' }}</td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>
        </div>
    </div>
</div>
