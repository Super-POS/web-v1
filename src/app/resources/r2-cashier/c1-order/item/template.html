<div class="cursor-pointer space-y-3 rounded-xl border border-slate-200 bg-white p-3 shadow-sm dark:border-gray-700 dark:bg-gray-800 hover:shadow-md hover:-translate-y-0.5 transition duration-200 ease-out"
    (click)="onOutput()">
    <div class="overflow-hidden rounded-lg border border-slate-200 dark:border-gray-700 bg-slate-50 dark:bg-gray-900">
        <img class="mx-auto h-44 w-full object-contain dark:hidden scale-95"
            [src]="data?.image ? fileUrl + data?.image : '/icons/photo.svg'" alt="Menu item" />
        <img class="mx-auto hidden h-44 w-full object-contain dark:block"
            [src]="data?.image ? fileUrl + data?.image : '/icons/photo.svg'" alt="Menu item" />
    </div>

    <div>
        <p class="text-xs text-slate-500 dark:text-slate-300 uppercase tracking-wide">
            <span> {{ data?.type.name }} </span>
        </p>
        <p class="text-base font-semibold text-slate-800 dark:text-white leading-tight mt-1 break-words">
            <span> {{ data?.name }} </span>
        </p>
        <p class="text-sm font-semibold text-emerald-600 dark:text-emerald-400 mt-1">
            ${{ data?.unit_price | usdFromKhr:khrPerUsdRate | number:'1.2-2' }}
        </p>
    </div>
</div>
