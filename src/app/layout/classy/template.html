<!-- Loading bar -->
<helper-loading-bar></helper-loading-bar>

<!-- Navigation -->
<helper-navigation class="dark border-r border-slate-800/80 bg-slate-950 print:hidden" [mode]="isScreenSmall ? 'over' : 'side'"
    [name]="'mainNavigation'" [navigations]="navigations" [opened]="!isScreenSmall">
    <!-- Navigation header hook -->
    <ng-container helperNavigationContentHeader>
        <div class="flex justify-center border-b border-white/5 px-4 py-5">
            <!-- Logo -->
            <div class="flex items-center gap-0.5">
                <img class="h-12 w-auto max-w-full object-contain" src="images/logo/Logo.png" alt="CoffeeShop POS logo">
            </div>
        </div>
    </ng-container>
    <!-- Navigation footer hook -->
    <ng-container helperNavigationContentFooter>
        <div class="my-2 flex h-32 flex-0 items-center justify-center px-4 opacity-5">
            <img class="max-h-32 w-auto" src="images/logo/Logo.png" alt="CoffeeShop POS logo" />
        </div>
    </ng-container>
</helper-navigation>

<!-- Wrapper: z-10 + relative so in-app fixed panels (e.g. switch-role) stack above the left nav (z-0 in side mode) -->
<div class="relative z-10 flex w-full min-w-0 flex-auto flex-col">
    <!-- Header -->
    <div
        class="bg-card/95 supports-[backdrop-filter]:bg-card/80 sticky top-0 z-49 flex h-15 w-full flex-0 items-center border-b border-gray-200/80 pl-2 backdrop-blur-md dark:border-white/5 md:pl-4 pr-3 print:hidden">
        <!-- Navigation toggle button -->
        <button class="block md:hidden mt-1" mat-icon-button (click)="toggleNavigation('mainNavigation')">
            <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
        </button>
        <div class="mb-0.5 ml-1 md:ml-0 min-w-0">
            <p class="text-[0.95rem] font-semibold tracking-tight text-zinc-900 sm:text-lg md:text-2xl dark:text-zinc-50">{{role?.name}}</p>
        </div>
        <!-- Components -->
        <div class="ml-auto flex items-center space-x-0.5 pl-2 sm:space-x-2">
            <scheme></scheme>
            <notifications></notifications>
            <languages></languages>
            <helper-fullscreen class="hidden md:block"></helper-fullscreen>
            <user></user>
        </div>
    </div>

    <!-- Content -->
    <div class="flex min-h-0 flex-auto flex-col">
        @if (true) {
        <router-outlet></router-outlet>
        }
    </div>

    <!-- Footer -->
    <!-- <div
        class="sticky bottom-0 flex flex-0 items-center justify-start w-full h-14 px-4 md:px-6 z-49 border-t bg-card dark:bg-transparent print:hidden">
        <span class="font-medium text-secondary">CoffeeShop POS &copy; {{currentYear}}</span>
    </div> -->
</div>
